[pytest]
# Pytest Configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --strict-markers --tb=short --cov=app --cov-report=html --cov-report=term-missing

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication tests
    crud: CRUD operation tests

# Timeout
timeout = 30

# Minimum Python version
minversion = 3.8
