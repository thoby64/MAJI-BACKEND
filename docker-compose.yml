version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: majiscope-db
    environment:
      POSTGRES_USER: majiscope
      POSTGRES_PASSWORD: majiscope_password
      POSTGRES_DB: majiscope_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U majiscope
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: majiscope-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@majiscope.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: majiscope-network
